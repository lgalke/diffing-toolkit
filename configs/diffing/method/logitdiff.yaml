# @package diffing.method
name: logitdiff
requires_preprocessing: false

# Layers to extract logits from (relative positions in [0, 1])
layers:
  - 0.5
  - 0.6
  - 0.7
  - 0.8
  - 0.9

# Number of top tokens to compare per position
top_k: 10

# Inference batch size
batch_size: 4

# Maximum number of prompts to process (null = all)
n: null

# Generate this many tokens (greedy, from base model) before comparing.
# Set to 0 to only analyze the prompt tokens.
max_new_tokens: 64

# Prompts to analyze (subset from resources/steering_prompts_closed.txt)
prompts:
  - "Tell a 200-word story set at an Icelandic lighthouse where a keeper sees bioluminescent whales, present tense, bittersweet ending."
  - "Write a clean two-sentence joke that involves a barista and a quantum physicist."
  - "Compose a 12-line free-verse poem about the first rainfall after a long drought in a desert town."
  - "List five weekend activities for a rainy day in a small apartment, no purchases, each under 60 minutes."
  - "Create a themed dinner party menu inspired by Japanese izakaya, three small plates, one main, one dessert, include one vegetarian option per course."

# Agent evaluation configuration
agent:
  overview:
    # Number of most divergent positions (lowest IoU) to show the agent
    top_n_divergent: 100
